<div class="busker-list-container">
  <div class="busker-list">
    <div class="busker-grid">
      <div class="busker-item" *ngFor="let busker of buskers; let i = index" [class.selected]="busker === selectedBusker" (click)="onSelect(busker)">
        <div class="flex-grid top-section">
          <div class="busker-profile-image-container col">
            <div class="busker-profile-image">
              <img [src]="busker.profileImageUrl || (busker.id | buskerPlaceholder)"
                   [style.object-position]="(busker.imgOffsetX ?? 50) + '% ' + (busker.imgOffsetY ?? 50) + '%'"
                   [style.transform]="busker.imgZoom && busker.imgZoom > 1.0 ? 'scale(' + busker.imgZoom + ')' : 'none'"
                   alt="Busker" />
            </div>
          </div>
          <div class="busker-user-details col">
            <div class="busker-user-name-container">
              <div class="busker-user-name">{{ busker.displayName || busker.email }}</div>
            </div>
            <div class="busker-user-location-container" *ngIf="busker.location">
              <div class="busker-user-location">{{ busker.location }}</div>
            </div>
          </div>
        </div>

        <div class="flex-grid" *ngIf="busker.bio">
          <div class="busker-bio-container col">
            <div class="busker-bio">{{ busker.bio }}</div>
          </div>
        </div>

        <div class="flex-grid">
          <div class="busker-followers-text-container col">
            <div class="busker-followers-text">Followers</div>
          </div>
          <div class="busker-followers-count col">
            <div>{{ busker.followers || 0 }}</div>
          </div>
          <div class="busker-events-text-container col">
            <div class="busker-events-text">Upcoming</div>
          </div>
          <div class="busker-events-count col">
            <div>{{ busker.upcomingEventsCount || 0 }}</div>
          </div>
        </div>

        <div class="flex-grid" *ngIf="busker.nextEventAt">
          <div class="busker-next-gig-container col">
            <div class="busker-next-gig">
              Next: {{ busker.nextEventAt * 1000 | date: 'EEE d MMM, h:mm a' }}
            </div>
          </div>
        </div>

        <div class="flex-grid">
          <div class="busker-social-container col">
            <div class="busker-social-icons">
              <!-- Instagram -->
              <span class="social-icon" title="Instagram">
                <svg viewBox="0 0 24 24" fill="currentColor">

                </svg>
              </span>
              <!-- TikTok -->
              <span class="social-icon" title="TikTok">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z"/>
                </svg>
              </span>
              <!-- YouTube -->
              <span class="social-icon" title="YouTube">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/>
                </svg>
              </span>
              <!-- Spotify -->
              <span class="social-icon" title="Spotify">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
                </svg>
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
