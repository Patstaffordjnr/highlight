<div class="busker-list-container">
  <div class="busker-list">
    <div class="busker-grid">
      <div class="busker-item"
        *ngFor="let busker of buskers; let i = index"
        [class.selected]="busker === selectedBusker"
        (click)="onSelect(busker)">
        <img [src]="busker.profileImageUrl || (busker.id | buskerPlaceholder)"
             class="busker-img"
             [style.object-position]="(busker.imgOffsetX ?? 50) + '% ' + (busker.imgOffsetY ?? 50) + '%'"
             [style.transform]="busker.imgZoom && busker.imgZoom > 1.0 ? 'scale(' + busker.imgZoom + ')' : 'none'"
             alt="Busker" />

        <div class="busker-name-overlay">
          <span class="busker-overlay-name">{{ busker.displayName || busker.email }}</span>
          <span class="busker-overlay-location" *ngIf="busker.location">{{ busker.location }}</span>
        </div>
        <div class="busker-gig-badge" *ngIf="busker.nextEventAt">
          {{ busker.nextEventAt * 1000 | date: 'd MMM' }}
        </div>
      </div>
    </div>
  </div>
</div>
