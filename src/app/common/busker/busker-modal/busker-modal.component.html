<div class="event-modal" *ngIf="isOpen" (click)="onBackdropClick($event)">
  <div #modalContent class="modal" (click)="$event.stopPropagation()">

    <!-- BUSKER DETAILS -->
    <div class="item-2">
      <div class="item-2-container">

        <!-- PROFILE IMAGE -->
        <div class="grid-item" id="item-1">
          <div class="event-image-container">
            <div class="event-image">
              <img [src]="busker?.profileImageUrl || (busker?.id | buskerPlaceholder)"
                   class="user-img"
                   [style.object-position]="(busker?.imgOffsetX ?? 50) + '% ' + (busker?.imgOffsetY ?? 50) + '%'"
                   [style.transform]="busker?.imgZoom && busker.imgZoom > 1.0 ? 'scale(' + busker.imgZoom + ')' : 'none'"
                   alt="user profile" />
            </div>
          </div>
        </div>

        <!-- NAME -->
        <div class="grid-item" id="item-2">
          <div class="event-user-name-container">
            <div class="event-user-name"><b>{{ busker?.displayName || busker?.email }}</b></div>
          </div>
        </div>

        <!-- LOCATION -->
        <div class="grid-item" id="item-3">
          <div class="busker-location-container">
            <div class="busker-location">{{ busker?.location || '' }}</div>
          </div>
        </div>

        <!-- BIO / MESSAGE -->
        <div class="grid-item" id="item-4">
          <div class="busker-bio-container">
            <div class="busker-bio">{{ busker?.bio || '' }}</div>
          </div>
        </div>

        <!-- SOCIAL ICONS -->
        <div class="grid-item" id="item-6">
          <div class="social-icons">
            <a class="social-icon" [class.active]="busker?.instagramUrl" [href]="busker?.instagramUrl || null" [attr.target]="busker?.instagramUrl ? '_blank' : null" title="Instagram">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 1.366.062 2.633.326 3.608 1.301.975.975 1.24 2.242 1.301 3.608.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.062 1.366-.326 2.633-1.301 3.608-.975.975-2.242 1.24-3.608 1.301-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-1.366-.062-2.633-.326-3.608-1.301-.975-.975-1.24-2.242-1.301-3.608C2.175 15.584 2.163 15.204 2.163 12s.012-3.584.07-4.85c.062-1.366.326-2.633 1.301-3.608.975-.975 2.242-1.24 3.608-1.301 1.266-.058 1.646-.07 4.85-.07zm0-2.163c-3.259 0-3.667.014-4.947.072-1.609.073-3.033.44-4.153 1.56C1.78 2.753 1.413 4.177 1.34 5.786 1.282 7.066 1.268 7.474 1.268 12s.014 4.934.072 6.214c.073 1.609.44 3.033 1.56 4.153 1.12 1.12 2.544 1.487 4.153 1.56 1.28.058 1.688.072 4.947.072s3.667-.014 4.947-.072c1.609-.073 3.033-.44 4.153-1.56 1.12-1.12 1.487-2.544 1.56-4.153.058-1.28.072-1.688.072-4.947s-.014-3.667-.072-4.947c-.073-1.609-.44-3.033-1.56-4.153-1.12-1.12-2.544-1.487-4.153-1.56C15.667.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zm0 10.162a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
            </a>
            <a class="social-icon" [class.active]="busker?.tiktokUrl" [href]="busker?.tiktokUrl || null" [attr.target]="busker?.tiktokUrl ? '_blank' : null" title="TikTok">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z"/></svg>
            </a>
            <a class="social-icon" [class.active]="busker?.youtubeUrl" [href]="busker?.youtubeUrl || null" [attr.target]="busker?.youtubeUrl ? '_blank' : null" title="YouTube">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>
            </a>
            <a class="social-icon" [class.active]="busker?.spotifyUrl" [href]="busker?.spotifyUrl || null" [attr.target]="busker?.spotifyUrl ? '_blank' : null" title="Spotify">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
            </a>
          </div>
        </div>

        <!-- FOLLOW BUTTON -->
        <div class="grid-item" id="item-5" *ngIf="!isOwnProfile">
          <div class="control-container">
            <button
              class="follow-btn"
              [class.following]="isFollowing"
              (click)="onFollowClick()">
              {{ isFollowing ? 'Unfollow' : 'Follow' }}
            </button>
          </div>
        </div>

        <!-- UPCOMING GIGS -->
        <div class="grid-item" id="item-events">
          <div class="upcoming-events-section">
            <div class="upcoming-title">Upcoming Gigs</div>
            <div *ngIf="eventsLoading" class="events-loading">Loading...</div>
            <div *ngIf="!eventsLoading && upcomingEvents.length === 0" class="events-empty">No upcoming gigs</div>
            <div class="events-list" *ngIf="!eventsLoading && upcomingEvents.length > 0">
              <div class="event-row" *ngFor="let event of upcomingEvents">
                <div class="event-row-date">
                  <span class="event-day">{{ event.startAt * 1000 | date: 'd MMM' }}</span>
                  <span class="event-time">{{ event.startAt * 1000 | date: 'h:mm a' }}</span>
                </div>
                <div class="event-row-info">
                  <span class="event-row-title">{{ event.title }}</span>
                  <span class="event-row-address" *ngIf="event.address">{{ event.address }}</span>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>
