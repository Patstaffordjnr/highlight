<div class="event-modal" *ngIf="isOpen" (click)="onBackdropClick($event)">
  <div #modalContent class="modal" (click)="$event.stopPropagation()">

    <!-- BUSKER DETAILS -->
    <div class="item-2">
      <div class="item-2-container">

        <!-- PROFILE IMAGE -->
        <div class="grid-item" id="item-1">
          <div class="event-image-container">
            <div class="event-image">
              <img src="/assets/userprofile.jpg" class="user-img" alt="user profile" />
            </div>
          </div>
        </div>

        <!-- EMAIL -->
        <div class="grid-item" id="item-2">
          <div class="event-user-name-container">
            <div class="event-user-name"><b>{{ busker?.email }}</b></div>
          </div>
        </div>

        <!-- JOIN DATE -->
        <div class="grid-item" id="item-3">
          <div class="event-title-container">
            <div class="event-title">Joined {{ busker?.createdAt * 1000 | date: 'MMM yyyy' }}</div>
          </div>
        </div>

        <!-- BIO -->
        <div class="grid-item" id="item-4">
          <div class="event-address">
            <div class="event-adress">{{ busker?.bio || '' }}</div>
          </div>
        </div>

        <!-- SOCIAL LINKS -->
        <div class="grid-item" id="item-6">
          <div class="social-icons">
            <a class="social-icon" title="Bandcamp">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M0 18.75l7.437-13.5H24l-7.438 13.5z"/></svg>
            </a>

            <a class="social-icon" title="Spotify">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
            </a>
          </div>
        </div>

        <!-- FOLLOW BUTTON -->
        <div class="grid-item" id="item-5" *ngIf="!isOwnProfile">
          <div class="control-container">
            <button
              class="follow-btn"
              [class.following]="isFollowing"
              (click)="onFollowClick()">
              {{ isFollowing ? 'Un-follow' : 'Follow' }}
            </button>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>
