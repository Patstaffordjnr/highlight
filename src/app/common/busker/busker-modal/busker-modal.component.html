<div class="event-modal" *ngIf="isOpen" (click)="onBackdropClick($event)">
  <div #modalContent class="modal" (click)="$event.stopPropagation()">

    <!-- BUSKER DETAILS -->
    <div class="item-2">
      <div class="item-2-container">

        <!-- PROFILE IMAGE -->
        <div class="grid-item" id="item-1">
          <div class="event-image-container">
            <div class="event-image">
              <img [src]="busker?.profileImageUrl || (busker?.id | buskerPlaceholder)"
                   class="user-img"
                   [style.object-position]="(busker?.imgOffsetX ?? 50) + '% ' + (busker?.imgOffsetY ?? 50) + '%'"
                   [style.transform]="busker?.imgZoom && busker.imgZoom > 1.0 ? 'scale(' + busker.imgZoom + ')' : 'none'"
                   alt="user profile" />
            </div>
          </div>
        </div>

        <!-- NAME -->
        <div class="grid-item" id="item-2">
          <div class="event-user-name-container">
            <div class="event-user-name"><b>{{ busker?.displayName || busker?.email }}</b></div>
          </div>
        </div>

        <!-- JOIN DATE -->
        <div class="grid-item" id="item-3">
          <div class="event-title-container">
            <div class="event-title">Joined {{ busker?.createdAt * 1000 | date: 'MMM yyyy' }}</div>
          </div>
        </div>

        <!-- BIO -->
        <div class="grid-item" id="item-4">
          <div class="event-address">
            <div class="event-adress">{{ busker?.bio || '' }}</div>
          </div>
        </div>

        <!-- FOLLOW BUTTON -->
        <div class="grid-item" id="item-5" *ngIf="!isOwnProfile">
          <div class="control-container">
            <button
              class="follow-btn"
              [class.following]="isFollowing"
              (click)="onFollowClick()">
              {{ isFollowing ? 'Unfollow' : 'Follow' }}
            </button>
          </div>
        </div>

        <!-- UPCOMING GIGS -->
        <div class="grid-item" id="item-events">
          <div class="upcoming-events-section">
            <div class="upcoming-title">Upcoming Gigs</div>
            <div *ngIf="eventsLoading" class="events-loading">Loading...</div>
            <div *ngIf="!eventsLoading && upcomingEvents.length === 0" class="events-empty">No upcoming gigs</div>
            <div class="events-list" *ngIf="!eventsLoading && upcomingEvents.length > 0">
              <div class="event-row" *ngFor="let event of upcomingEvents">
                <div class="event-row-date">
                  <span class="event-day">{{ event.startAt * 1000 | date: 'd MMM' }}</span>
                  <span class="event-time">{{ event.startAt * 1000 | date: 'h:mm a' }}</span>
                </div>
                <div class="event-row-info">
                  <span class="event-row-title">{{ event.title }}</span>
                  <span class="event-row-address" *ngIf="event.address">{{ event.address }}</span>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>
