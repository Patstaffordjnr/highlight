<div class="event-modal" *ngIf="isOpen" (click)="onBackdropClick($event)">
  <div #modalContent class="modal" (click)="$event.stopPropagation()">

    <!-- BUSKER DETAILS -->
    <div class="item-2">
      <div class="item-2-container">

        <!-- PROFILE IMAGE -->
        <div class="grid-item" id="item-1">
          <div class="event-image-container">
            <div class="event-image">
              <img src="/assets/userprofile.jpg" class="user-img" alt="user profile" />
            </div>
          </div>
        </div>

        <!-- NAME -->
        <div class="grid-item" id="item-2">
          <div class="event-user-name-container">
            <div class="event-user-name"><b>{{ busker?.displayName || busker?.email }}</b></div>
          </div>
        </div>

        <!-- JOIN DATE -->
        <div class="grid-item" id="item-3">
          <div class="event-title-container">
            <div class="event-title">Joined {{ busker?.createdAt * 1000 | date: 'MMM yyyy' }}</div>
          </div>
        </div>

        <!-- BIO -->
        <div class="grid-item" id="item-4">
          <div class="event-address">
            <div class="event-adress">{{ busker?.bio || '' }}</div>
          </div>
        </div>

        <!-- FOLLOW BUTTON -->
        <div class="grid-item" id="item-5" *ngIf="!isOwnProfile">
          <div class="control-container">
            <button
              class="follow-btn"
              [class.following]="isFollowing"
              (click)="onFollowClick()">
              {{ isFollowing ? 'Unfollow' : 'Follow' }}
            </button>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>
