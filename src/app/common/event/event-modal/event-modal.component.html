<div class="event-modal" *ngIf="isOpen" (click)="onBackdropClick($event)">
  <div #modalContent class="modal" (click)="$event.stopPropagation()">

    <!-- MAP -->
    <div class="item-1-container">
      <div class="item-1">
        <div class="mapContainer">
          <app-map
            class="map"
            (mapInput)="onMapReady($event)"
            (mapCenterChanged)="onMapMoved($event)"
            (mapClicked)="onMapClicked($event)">
          </app-map>
        </div>
      </div>
    </div>

    <!-- EVENT DETAILS -->
    <div class="item-2">
      <div class="item-2-container">

        <!-- USER IMAGE -->
        <div class="grid-item" id="item-1">
          <div class="event-image-container">
            <div class="event-image">
              <img src="/assets/userprofile.jpg" class="user-img" alt="user profile" />
            </div>
          </div>
        </div>

        <!-- USER NAME -->
<div class="grid-item" id="item-2">
  <div class="event-user-name-container">
    <div *ngIf="!isEditing || isCreateMode" class="event-user-name"><b>{{ userName }}</b></div>
    <input
      *ngIf="isEditing && !isCreateMode"
      class="event-user-name-input"
      type="text"
      placeholder="Username">
  </div>
</div>

        <!-- EVENT TITLE -->
        <div class="grid-item" id="item-3">
          <div class="event-title-container">
            <div *ngIf="!isEditing" class="event-title">{{ currentEvent.title }}</div>
            <input
              *ngIf="isEditing"
              class="event-title-input"
              type="text"
              [(ngModel)]="currentEvent.title"
              placeholder="Event title">
          </div>
        </div>

        <!-- ADDRESS -->
        <div class="grid-item" id="item-4">
          <div class="event-address">
            <div class="event-adress"><b>{{ address }}</b></div>
            <div *ngIf="isEditing" class="change-address-button">
              <button
                *ngIf="!isSelectingLocation"
                (click)="startLocationSelection()"
                class="change-address-btn">
                {{ isCreateMode ? 'Set Location' : 'Change Address' }}
              </button>
              <button
                *ngIf="isSelectingLocation"
                (click)="cancelLocationSelection()"
                class="cancel-btn">
                Cancel
              </button>
              <span *ngIf="isSelectingLocation" class="selecting-hint">
                Click on the map to place new location
              </span>
            </div>
          </div>
        </div>

        <!-- DATE & TIME -->
        <div class="grid-item" id="item-5">

          <div class="flex-grid">
            <div class="event-start-date-container col">
              <div class="event-start-date">{{ currentEvent.startAt | date: 'MMM d, y' }}</div>
            </div>
            <div class="event-start-time-container col">
              <div class="event-start-time">{{ currentEvent.startAt | date: 'shortTime' }}</div>
            </div>
          </div>

          <div *ngIf="isEditing" class="progress-bar-container-start">
            <app-progress-bar
              class="progress-bar-start"
              [selectedTime]="currentEvent.startAt"
              (selectTimeEvent)="onStartTimeSelected($event)">
            </app-progress-bar>
          </div>

          <div *ngIf="isEditing" class="calendar-container-start">
            <app-calendar
              class="calendar"
              [selectedDate]="currentEvent.startAt"
              [containerClass]="'calendar-start-scroll'"
              (selectDateEvent)="onStartDateSelected($event)">
            </app-calendar>
          </div>

          <div class="flex-grid">
            <div class="event-finish-date-container col">
              <div class="event-finish-date">{{ currentEvent.endAt | date: 'MMM d, y' }}</div>
            </div>
            <div class="event-finish-time-container col">
              <div class="event-finish-time">{{ currentEvent.endAt | date: 'shortTime' }}</div>
            </div>
          </div>

          <div *ngIf="isEditing" class="progress-bar-container-end">
            <app-progress-bar
              class="progress-bar-end"
              [selectedTime]="currentEvent.endAt"
              (selectTimeEvent)="onEndTimeSelected($event)">
            </app-progress-bar>
          </div>

          <div *ngIf="isEditing" class="calendar-container-end">
            <app-calendar
              class="calendar"
              [selectedDate]="currentEvent.endAt"
              [containerClass]="'calendar-end-scroll'"
              (selectDateEvent)="onEndDateSelected($event)">
            </app-calendar>
          </div>

          <!-- EDIT BUTTON -->
          <div class="control-container" *ngIf="canEdit && !isCreateMode">
            <div class="control" (click)="onEditClick()">
              EDIT
              <span *ngIf="isEditing" class="editing-flag"> (editing)</span>
            </div>
          </div>

          <!-- SAVE BUTTON -->
          <div class="control-container" *ngIf="isEditing">
            <button class="change-address-btn" (click)="onSave()">
              {{ isCreateMode ? 'Create Event' : 'Save Changes' }}
            </button>
          </div>

          <!-- FOLLOW BUTTON -->
          <div class="control-container" *ngIf="!isCreateMode">
            <button
              class="follow-btn"
              [class.following]="isFollowing"
              (click)="onFollowClick()">
              {{ isFollowing ? 'Unfollow' : 'Follow' }}
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
