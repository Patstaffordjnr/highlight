<div class="page">
  <div class="card">
    <div class="brand">Highlight</div>
    <p class="tagline">We'll send a reset link to your email</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!submitted">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="pat@highlight.ie" autocomplete="email">
      </div>

      <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" [disabled]="!form.valid || loading">
        {{ loading ? 'Sending...' : 'Send Reset Link' }}
      </button>
    </form>

    <div class="success-msg" *ngIf="submitted">
      If an account exists for that email, a reset link is on its way.
    </div>

    <p class="switch-link"><a routerLink="/login">Back to log in</a></p>
  </div>
</div>
