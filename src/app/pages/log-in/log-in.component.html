<div class="page">
  <div class="card">
    <div class="brand">Highlight</div>
    <p class="tagline">Discover live music near you</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="Password" autocomplete="current-password">
      </div>

      <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" [disabled]="!form.valid || loading">
        {{ loading ? 'Logging in...' : 'Log In' }}
      </button>
    </form>

    <p class="switch-link">Don't have an account? <a routerLink="/signup">Sign up</a></p>
  </div>
</div>
