<div class="page">
  <div class="card">
    <div class="brand">Highlight</div>
    <p class="tagline">Set a new password</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!success">
      <div class="field">
        <label for="newPassword">New password</label>
        <input id="newPassword" type="password" formControlName="newPassword" placeholder="••••••••••••" autocomplete="new-password">
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm password</label>
        <input id="confirmPassword" type="password" formControlName="confirmPassword" placeholder="••••••••••••" autocomplete="new-password">
      </div>

      <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" [disabled]="!form.valid || loading">
        {{ loading ? 'Saving...' : 'Set New Password' }}
      </button>
    </form>

    <div class="success-msg" *ngIf="success">
      Password updated. <a routerLink="/login">Log in</a>
    </div>

    <p class="switch-link" *ngIf="!success"><a routerLink="/login">Back to log in</a></p>
  </div>
</div>
